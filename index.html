<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서울 지하철 실시간 도착정보</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-bar"></div>
    <div class="header-inner">
      <div class="header-title">
        <div>
          <h1>🚇 서울 지하철</h1>
          <p id="last-updated">노선을 선택하거나 역 이름을 검색하세요</p>
        </div>
      </div>
      <div class="badge">실시간 도착정보</div>
    </div>
  </header>

  <main>

    <!-- 노선 탭 메뉴 -->
    <div class="line-tabs" id="line-tabs"></div>

    <!-- 노선도 -->
    <div class="route-map hidden" id="route-map">
      <div class="route-header">
        <span class="route-title" id="route-title"></span>
        <span class="route-tip">역을 클릭하면 실시간 도착정보를 조회합니다</span>
      </div>
      <div class="route-scroll">
        <div class="route-track" id="route-track"></div>
      </div>
    </div>

    <!-- 모드 탭 -->
    <div class="mode-tabs">
      <button class="mode-tab active" id="tab-arrival">🚇 도착 알림</button>
      <button class="mode-tab" id="tab-route">🗺 경로 안내</button>
    </div>

    <!-- ── 도착 알림 모드 ── -->
    <div id="mode-arrival">
      <!-- 검색창 -->
      <div class="search-wrap">
        <div class="search-box">
          <input
            type="text"
            id="station-input"
            placeholder="역 이름 직접 검색 (예: 강남, 홍대입구)"
            autocomplete="off"
          />
          <button id="search-btn">조회</button>
        </div>
        <ul class="suggest-list" id="suggest-list"></ul>
      </div>

      <!-- 상태 메시지 -->
      <div id="status-msg" class="status-msg hidden"></div>

      <!-- 새로고침 -->
      <div class="refresh-bar hidden" id="refresh-bar">
        <span id="refresh-info"></span>
        <button id="refresh-btn">🔄 새로고침</button>
      </div>

      <!-- 시간표 버튼 -->
      <button class="schedule-btn hidden" id="schedule-btn">🕐 예정 시간표 보기</button>

      <!-- 결과 -->
      <section class="arrival-grid" id="arrival-grid"></section>

      <!-- 시간표 섹션 -->
      <div class="schedule-section hidden" id="schedule-section"></div>
    </div>

    <!-- ── 경로 안내 모드 ── -->
    <div id="mode-route" class="hidden">
      <div class="route-search-wrap">
        <div class="route-inputs">
          <div class="route-input-group">
            <label>출발역</label>
            <div class="search-box">
              <input type="text" id="route-from" placeholder="출발역 입력" autocomplete="off">
            </div>
            <ul class="suggest-list" id="suggest-from"></ul>
          </div>
          <button class="swap-btn" id="swap-btn" title="출발/도착 바꾸기">⇅</button>
          <div class="route-input-group">
            <label>도착역</label>
            <div class="search-box">
              <input type="text" id="route-to" placeholder="도착역 입력" autocomplete="off">
            </div>
            <ul class="suggest-list" id="suggest-to"></ul>
          </div>
        </div>
        <button class="btn-find-route" id="find-route-btn">경로 검색</button>
      </div>
      <div id="route-result"></div>
    </div>

  </main>

  <footer>
    <p>데이터 출처: 서울 열린데이터 광장 · 실시간 자동 갱신 (30초)</p>
  </footer>

  <!-- ── 전체노선도 모달 ── -->
  <div class="fm-overlay hidden" id="fm-overlay">
    <div class="fm-panel">
      <div class="fm-toolbar">
        <span class="fm-title">🗺 서울 지하철 전체 노선도</span>
        <div class="fm-controls">
          <button class="fm-btn" id="fm-zoom-in">＋ 확대</button>
          <button class="fm-btn" id="fm-zoom-out">－ 축소</button>
          <button class="fm-btn" id="fm-reset">원래 크기</button>
          <button class="fm-btn fm-close-btn" id="fm-close">✕ 닫기</button>
        </div>
      </div>
      <div class="fm-hint">드래그로 이동 · 핀치/버튼으로 확대·축소</div>
      <div class="fm-viewport" id="fm-viewport">
        <div class="fm-inner" id="fm-inner">
          <img class="fm-img" id="fm-img"
               src="https://upload.wikimedia.org/wikipedia/commons/8/85/Seoul_subway_linemap_ko.svg"
               alt="서울 지하철 전체 노선도"
               draggable="false">
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
